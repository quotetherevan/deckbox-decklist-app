<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deck Box Owner Portal - Variant Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-7xl mx-auto space-y-6">
        <header class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
            <div>
                <h1 class="text-2xl font-black text-gray-900">Deck Box Customizer</h1>
                <p class="text-sm text-gray-500">Advanced Engine: Multi-artwork variant selection switcher with legality checks</p>
            </div>
            <span class="bg-indigo-100 text-indigo-800 text-xs font-bold px-3 py-1 rounded-full">Format Overlays Active</span>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <section class="lg:col-span-4 bg-white p-6 rounded-2xl shadow-sm border border-gray-200 flex flex-col h-[850px]">
                <h2 class="text-lg font-bold text-gray-800 mb-3">1. Add Cards to Box</h2>
                
                <div class="space-y-3 mb-4">
                    <input type="text" id="searchInput" placeholder="Try 'Dark Magician' or 'Blue-Eyes'..." 
                           class="w-full px-3 py-2 border rounded-lg text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    
                    <div class="flex gap-2">
                        <button id="searchBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg text-xs transition">
                            Search Card
                        </button>
                        <select id="targetDeck" class="border rounded-lg text-xs bg-gray-50 px-2 font-semibold text-gray-700">
                            <option value="main">Add to Main</option>
                            <option value="side">Add to Side</option>
                        </select>
                    </div>
                </div>

                <div id="searchResults" class="flex-1 overflow-y-auto border-t pt-3 grid grid-cols-2 gap-2 content-start">
                    <p class="text-xs text-gray-400 col-span-2 text-center py-8">Search results will display here. Click a card to add it to your box.</p>
                </div>
            </section>

            <section class="lg:col-span-8 bg-white p-6 rounded-2xl shadow-sm border border-gray-200 flex flex-col h-[850px] overflow-y-auto space-y-6">
                <div class="border-b pb-4">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <div class="flex flex-wrap items-center gap-3 flex-1">
                            <div class="flex flex-col min-w-[200px]">
                                <label for="boxNameInput" class="text-[9px] font-black uppercase tracking-wider text-gray-400 mb-0.5">Deck Profile Name</label>
                                <input type="text" id="boxNameInput" placeholder="Enter Deck Profile Name..." 
                                       class="text-xl font-extrabold text-gray-900 border-b border-transparent hover:border-gray-300 focus:border-blue-500 focus:outline-none pb-1">
                            </div>
                            
                            <div class="flex flex-col pt-3">
                                <label for="formatSelector" class="text-[9px] font-black uppercase tracking-wider text-gray-400 mb-0.5">Format Ruleset</label>
                                <select id="formatSelector" class="border rounded-lg text-xs bg-indigo-50 border-indigo-200 px-2 py-1.5 font-bold text-indigo-900 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                    <option value="advanced">Advanced Format (2026)</option>
                                    <option value="edison">Edison Format (2010)</option>
                                    <option value="genisys">Genisys Format (Points)</option>
                                </select>
                            </div>

                            <div class="flex flex-col pt-3">
                                <label class="text-[9px] font-black uppercase tracking-wider text-gray-400 mb-0.5">Profile Selector</label>
                                <select id="deckSwitcher" class="border rounded-lg text-xs bg-gray-50 px-2 py-1.5 font-semibold text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                            </div>
                            
                            <div class="flex flex-col pt-3">
                                <label class="text-[9px] font-black uppercase tracking-wider transparent select-none text-transparent mb-0.5">Control</label>
                                <button id="newDeckBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-2.5 py-1.5 rounded-lg text-xs transition flex items-center gap-1">
                                    <i class="fa-solid fa-plus"></i> New Deck
                                </button>
                            </div>
                        </div>
                        <button id="clearBtn" class="text-xs text-red-500 hover:underline font-semibold self-end sm:self-center">Clear Box</button>
                    </div>
                    <p class="text-xs text-gray-400 mt-2">Dynamic Web Path: <span class="underline text-blue-500">yourdomain.com/deck/db-local</span></p>
                </div>

                <div class="bg-gray-50 px-4 py-3 rounded-xl border border-gray-100 flex flex-col sm:flex-row sm:items
